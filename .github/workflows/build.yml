name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Spitit Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Run Build Script (Standalone & Setup Installer)
        shell: powershell
        run: |
          # Add Inno Setup 6 to PATH if not already present
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          .\build-release.ps1 -Installer

      - name: Locate Build Artifacts
        shell: powershell
        id: locate_artifacts
        run: |
          $setupFile = Get-ChildItem "dist_installer" -Filter "REREAL-Spitit-Setup-*.exe" | Select-Object -First 1
          if (-not $setupFile) {
              throw "Installer setup file not found in dist_installer!"
          }
          echo "SETUP_PATH=$($setupFile.FullName)" >> $env:GITHUB_OUTPUT
          echo "SETUP_NAME=$($setupFile.Name)" >> $env:GITHUB_OUTPUT
          echo "PORTABLE_PATH=dist\REREAL-Spitit.exe" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.locate_artifacts.outputs.SETUP_PATH }}
            ${{ steps.locate_artifacts.outputs.PORTABLE_PATH }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest Rolling Release' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
