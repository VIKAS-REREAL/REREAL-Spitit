name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller REREAL-Spitit.spec

      - name: Get Version and Changelog
        id: vars
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          # Extract the latest entry from CHANGELOG.md (everything until the next ## header)
          sed -n '/## \[1.0.0\]/,/## \[/p' CHANGELOG.md | sed '$d' > release_notes.md
          # If it's a tag, we might want to dynamically find the version, 
          # but for v1.0.0 we'll just use the tag.

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/REREAL-Spitit.exe
          body_path: release_notes.md
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
