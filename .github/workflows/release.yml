name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller REREAL-Spitit.spec

      - name: Get Version and Changelog
        id: vars
        shell: bash
        run: |
          # Get tag name (e.g., v1.0.0)
          TAG_NAME=${GITHUB_REF_NAME}
          # Strip 'v' prefix for version matching in CHANGELOG (e.g., 1.0.0)
          VERSION=${TAG_NAME#v}
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # Extract the latest entry from CHANGELOG.md for this version
          # It looks for the section starting with [VERSION] and grabs everything until the next [ header
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          
          # Fallback if notes are empty
          if [ ! -s release_notes.md ]; then
            echo "Release $TAG_NAME" > release_notes.md
          fi

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/REREAL-Spitit.exe
          body_path: release_notes.md
          name: REREAL Spitit ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
